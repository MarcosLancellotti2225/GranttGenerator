<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt Chart Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }

  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: #12122a; border-bottom: 1px solid #2a2a4a;
    padding: 10px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .toolbar-title { font-size: 14px; font-weight: 700; color: #7b7bf7; margin-right: 4px; white-space: nowrap; }
  .toolbar-group { display: flex; align-items: center; gap: 6px; }
  .toolbar label { font-size: 11px; color: #888; white-space: nowrap; }
  .toolbar input[type="text"], .toolbar select {
    background: #1e1e3a; border: 1px solid #333360; color: #ddd;
    padding: 5px 8px; border-radius: 6px; font-size: 12px; font-family: inherit;
  }
  .toolbar input[type="text"] { width: 140px; }
  .toolbar-spacer { flex: 1; }
  .btn { padding: 6px 14px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .btn-success { background: #22aa66; color: white; } .btn-success:hover { background: #33bb77; }
  .btn-danger { background: #cc3355; color: white; } .btn-danger:hover { background: #dd4466; }
  .btn-ghost { background: #2a2a4a; color: #aaa; } .btn-ghost:hover { background: #333360; color: #ddd; }

  .workspace { display: flex; gap: 0; min-height: calc(100vh - 50px); }

  .editor-panel {
    width: 370px; min-width: 370px; background: #14142c;
    border-right: 1px solid #2a2a4a; overflow-y: auto; padding: 16px;
    max-height: calc(100vh - 50px);
  }
  .editor-section { margin-bottom: 16px; }
  .editor-section-title {
    font-size: 11px; font-weight: 700; color: #7b7bf7;
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
  }

  .color-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #1e1e3a; }
  .color-row label.cr-label { font-size: 11px; color: #aaa; width: 60px; flex-shrink: 0; }
  .color-row input[type="color"] { width: 28px; height: 28px; border: none; border-radius: 4px; cursor: pointer; padding: 0; background: none; flex-shrink: 0; }
  .color-toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
  .color-toggle input { opacity: 0; width: 0; height: 0; }
  .color-toggle .slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #333360; border-radius: 9px; transition: 0.2s;
  }
  .color-toggle .slider::before {
    content: ''; position: absolute; height: 14px; width: 14px;
    left: 2px; bottom: 2px; background: #666; border-radius: 50%; transition: 0.2s;
  }
  .color-toggle input:checked + .slider { background: #4444ee; }
  .color-toggle input:checked + .slider::before { transform: translateX(16px); background: white; }
  .color-disabled { opacity: 0.3; pointer-events: none; }

  .bg-mode-row { display: flex; gap: 4px; margin: 6px 0; }
  .bg-mode-btn {
    flex: 1; padding: 5px 6px; border-radius: 4px; border: 1px solid #333360;
    background: #1a1a36; color: #888; font-size: 10px; font-weight: 600;
    cursor: pointer; text-align: center; font-family: inherit; transition: 0.15s;
  }
  .bg-mode-btn.active { background: #4444ee; color: white; border-color: #4444ee; }
  .bg-sub-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .bg-sub-row label { font-size: 10px; color: #888; }
  .bg-sub-row select {
    background: #1e1e3a; border: 1px solid #333360; color: #ccc;
    padding: 3px 6px; border-radius: 4px; font-size: 11px; font-family: inherit;
  }

  .phase-card { background: #1a1a36; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px; margin-bottom: 8px; transition: border-color 0.15s; }
  .phase-card:hover { border-color: #4444ee; }
  .phase-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .phase-card-header input[type="text"] {
    flex: 1; background: transparent; border: 1px solid transparent; color: #ddd;
    padding: 3px 6px; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: inherit;
  }
  .phase-card-header input[type="text"]:focus { border-color: #4444ee; outline: none; background: #1e1e3a; }
  .phase-card-header input[type="color"] { width: 24px; height: 24px; border: none; border-radius: 4px; cursor: pointer; padding: 0; background: none; }
  .phase-card-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .phase-card-row label { font-size: 10px; color: #777; width: 50px; flex-shrink: 0; }
  .phase-card-row select {
    background: #1e1e3a; border: 1px solid #2a2a4a; color: #ccc;
    padding: 3px 6px; border-radius: 4px; font-size: 11px; font-family: inherit; flex: 1;
  }
  .task-list { margin-top: 6px; }
  .task-item { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
  .task-item input {
    flex: 1; background: transparent; border: 1px solid transparent; color: #bbb;
    padding: 2px 6px; border-radius: 4px; font-size: 11px; font-family: inherit;
  }
  .task-item input:focus { border-color: #333360; outline: none; background: #1e1e3a; }
  .task-remove { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
  .task-remove:hover { color: #cc3355; }
  .add-task-btn {
    background: none; border: 1px dashed #333360; color: #666; font-size: 10px;
    padding: 3px 8px; border-radius: 4px; cursor: pointer; font-family: inherit; margin-top: 4px;
  }
  .add-task-btn:hover { border-color: #4444ee; color: #4444ee; }

  .preview-panel {
    flex: 1; overflow: auto; padding: 32px;
    display: flex; align-items: flex-start; justify-content: center;
    max-height: calc(100vh - 50px);
  }
  .preview-wrapper { transform-origin: top center; border-radius: 8px; }
  .transparency-bg {
    background-image:
      linear-gradient(45deg, #222 25%, transparent 25%),
      linear-gradient(-45deg, #222 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #222 75%),
      linear-gradient(-45deg, transparent 75%, #222 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
  }

  /* ── GANTT (CSS Grid based) ── */
  #gantt-export { padding: 28px 32px; min-width: 880px; border-radius: 10px; }
  .gantt-title { font-size: 20px; font-weight: 800; margin-bottom: 3px; }
  .gantt-subtitle { font-size: 11px; margin-bottom: 20px; opacity: 0.5; }
  .gantt-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 10px; }
  .gantt-footer-logo { font-size: 12px; font-weight: 800; }
  .gantt-footer-text { font-size: 9px; opacity: 0.4; }

  .g-table { width: 100%; }

  /* Header row */
  .g-header { display: grid; padding-bottom: 7px; }
  .g-header-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: end; }
  .g-header-unit { font-size: 9.5px; font-weight: 600; text-align: center; display: flex; align-items: end; justify-content: center; }

  /* Data row */
  .g-row { display: grid; min-height: 36px; }
  .g-row-label { padding: 6px 10px 6px 0; }
  .g-phase-name { font-size: 10.5px; font-weight: 700; margin-bottom: 2px; }
  .g-tasks { list-style: none; }
  .g-tasks li { font-size: 9px; opacity: 0.6; line-height: 1.35; padding-left: 9px; position: relative; }
  .g-tasks li::before { content: '–'; position: absolute; left: 0; }

  /* The bar spans multiple columns */
  .g-bar-wrap { display: flex; align-items: flex-start; padding: 6px 4px; }
  .g-bar {
    width: 100%; border-radius: 4px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8.5px; font-weight: 700; color: white; letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* Empty cells for grid lines */
  .g-cell-empty { }

  @media (max-width: 1100px) { .editor-panel { width: 300px; min-width: 300px; } }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">Gantt Generator</div>
  <div class="toolbar-group">
    <label>Título:</label>
    <input type="text" id="chartTitle" value="Project Timeline" oninput="render()">
  </div>
  <div class="toolbar-group">
    <label>Subtítulo:</label>
    <input type="text" id="chartSubtitle" value="Project Plan — Q2 2026" oninput="render()">
  </div>
  <div class="toolbar-group">
    <label>Unidad:</label>
    <select id="unitMode" onchange="renderEditor();render()">
      <option value="weeks">Semanas</option>
      <option value="days">Días</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>Footer:</label>
    <input type="text" id="footerLogo" value="Company Name" oninput="render()" style="width:120px">
  </div>
  <div class="toolbar-group">
    <label>Versión:</label>
    <input type="text" id="footerVersion" value="v1.0 — 2026" oninput="render()" style="width:150px">
  </div>
  <div class="toolbar-spacer"></div>
  <button class="btn btn-danger" onclick="resetAll()">🗑 Reset</button>
  <button class="btn btn-success" onclick="exportPNG()">⬇ PNG</button>
</div>

<div class="workspace">
  <div class="editor-panel">

    <div class="editor-section">
      <div class="editor-section-title">Colores</div>
      <div class="color-row">
        <label class="cr-label">Texto</label>
        <label class="color-toggle"><input type="checkbox" id="textColorOn" checked onchange="render()"><span class="slider"></span></label>
        <span id="textColorWrap"><input type="color" id="textColor" value="#0a0a3e" oninput="render()"></span>
      </div>
      <div class="color-row">
        <label class="cr-label">Acento</label>
        <label class="color-toggle"><input type="checkbox" id="borderColorOn" checked onchange="render()"><span class="slider"></span></label>
        <span id="borderColorWrap"><input type="color" id="borderColor" value="#0000cc" oninput="render()"></span>
      </div>
      <div class="color-row">
        <label class="cr-label">Footer</label>
        <label class="color-toggle"><input type="checkbox" id="footerColorOn" checked onchange="render()"><span class="slider"></span></label>
        <span id="footerColorWrap"><input type="color" id="footerColor" value="#0000cc" oninput="render()"></span>
      </div>
      <div class="color-row">
        <label class="cr-label">Líneas</label>
        <label class="color-toggle"><input type="checkbox" id="gridLinesOn" checked onchange="render()"><span class="slider"></span></label>
        <span id="gridLinesWrap"><input type="color" id="gridLinesColor" value="#cccccc" oninput="render()"></span>
      </div>
      <div style="margin-top:12px">
        <div style="font-size:11px;color:#aaa;margin-bottom:6px;font-weight:600;">Fondo</div>
        <div class="bg-mode-row">
          <button class="bg-mode-btn" id="bgModeNone" onclick="setBgMode('none')">Sin fondo</button>
          <button class="bg-mode-btn active" id="bgModeSolid" onclick="setBgMode('solid')">Sólido</button>
          <button class="bg-mode-btn" id="bgModeGradient" onclick="setBgMode('gradient')">Degradé</button>
        </div>
        <div id="bgSolidRow" class="bg-sub-row">
          <label>Color</label>
          <input type="color" id="bgColor1" value="#ffffff" oninput="render()" style="width:28px;height:28px;border:none;border-radius:4px;cursor:pointer;padding:0;background:none;">
        </div>
        <div id="bgGradientRow" style="display:none">
          <div class="bg-sub-row">
            <label>Color 1</label>
            <input type="color" id="bgGrad1" value="#0000cc" oninput="render()" style="width:28px;height:28px;border:none;border-radius:4px;cursor:pointer;padding:0;background:none;">
            <label>Color 2</label>
            <input type="color" id="bgGrad2" value="#6666f0" oninput="render()" style="width:28px;height:28px;border:none;border-radius:4px;cursor:pointer;padding:0;background:none;">
          </div>
          <div class="bg-sub-row">
            <label>Dirección</label>
            <select id="bgGradDir" onchange="render()">
              <option value="to right">→ Horizontal</option>
              <option value="to left">← Horizontal inv.</option>
              <option value="to bottom">↓ Vertical</option>
              <option value="to top">↑ Vertical inv.</option>
              <option value="to bottom right">↘ Diagonal</option>
              <option value="to top right">↗ Diagonal inv.</option>
              <option value="to bottom left">↙ Diagonal izq.</option>
              <option value="135deg">◇ 135°</option>
              <option value="circle">◉ Radial</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-section-title">Fases del Proyecto</div>
      <div id="phaseList"></div>
      <button class="btn btn-ghost" onclick="addPhase()" style="width:100%;margin-top:8px;">+ Agregar fase</button>
    </div>
  </div>

  <div class="preview-panel">
    <div class="preview-wrapper" id="previewWrapper">
      <div id="gantt-export"></div>
    </div>
  </div>
</div>

<script>
let bgMode = 'solid';
let phases = [
  { name: "1. Discovery & Planning", color: "#0000cc", start: 1, duration: 1, tasks: ["Stakeholder interviews", "Requirements gathering", "Define project scope"] },
  { name: "2. Environment Setup", color: "#1a1adf", start: 2, duration: 2, tasks: ["Provision infrastructure", "Configure CI/CD pipeline", "Set up monitoring"] },
  { name: "3. Core Development", color: "#3333e6", start: 4, duration: 3, tasks: ["Backend API development", "Frontend implementation", "Database schema design", "Unit testing"] },
  { name: "4. Integration & QA", color: "#4d4ded", start: 7, duration: 2, tasks: ["Third-party integrations", "End-to-end testing", "Performance benchmarks"] },
  { name: "5. UAT & Feedback", color: "#6666f0", start: 9, duration: 1, tasks: ["User acceptance testing", "Bug fixes & adjustments", "Documentation"] },
  { name: "6. Deployment & Go-Live", color: "#0000cc", start: 10, duration: 1, tasks: ["Production deployment", "Monitoring & stabilization", "Handoff & training"] }
];

function getUnit() { return document.getElementById('unitMode').value; }
function getUnitShort() { return getUnit() === 'days' ? 'D' : 'S'; }
function getUnitLabel() { return getUnit() === 'days' ? 'Día' : 'Sem'; }

function getTotalUnits() {
  let max = 0;
  phases.forEach(p => { const end = p.start + p.duration - 1; if (end > max) max = end; });
  return Math.max(max, 1);
}

function getBarLabel(start, duration) {
  const s = getUnitShort();
  if (duration === 1) return `${s}${start}`;
  return `${s}${start} – ${s}${start + duration - 1}`;
}

function setBgMode(mode) {
  bgMode = mode;
  document.getElementById('bgModeNone').classList.toggle('active', mode === 'none');
  document.getElementById('bgModeSolid').classList.toggle('active', mode === 'solid');
  document.getElementById('bgModeGradient').classList.toggle('active', mode === 'gradient');
  document.getElementById('bgSolidRow').style.display = mode === 'solid' ? 'flex' : 'none';
  document.getElementById('bgGradientRow').style.display = mode === 'gradient' ? 'block' : 'none';
  render();
}

function getBgStyle() {
  if (bgMode === 'none') return 'transparent';
  if (bgMode === 'solid') return document.getElementById('bgColor1').value;
  const c1 = document.getElementById('bgGrad1').value;
  const c2 = document.getElementById('bgGrad2').value;
  const dir = document.getElementById('bgGradDir').value;
  if (dir === 'circle') return `radial-gradient(circle, ${c1}, ${c2})`;
  return `linear-gradient(${dir}, ${c1}, ${c2})`;
}

// ── EDITOR ──
function renderEditor() {
  const c = document.getElementById('phaseList'); c.innerHTML = '';
  const tu = getTotalUnits();
  const uLabel = getUnitLabel();
  const maxUnits = Math.max(tu + 5, 20);

  phases.forEach((p, i) => {
    const card = document.createElement('div'); card.className = 'phase-card';
    let so = ''; for (let w = 1; w <= maxUnits; w++) so += `<option value="${w}" ${w === p.start ? 'selected' : ''}>${uLabel} ${w}</option>`;
    let du = ''; for (let d = 1; d <= maxUnits; d++) du += `<option value="${d}" ${d === p.duration ? 'selected' : ''}>${d} ${d === 1 ? getUnit().slice(0, -1) : getUnit()}</option>`;
    // Fix: semana/semanas, día/días
    du = '';
    for (let d = 1; d <= maxUnits; d++) {
      const unitWord = getUnit() === 'days' ? (d === 1 ? 'día' : 'días') : (d === 1 ? 'sem' : 'sems');
      du += `<option value="${d}" ${d === p.duration ? 'selected' : ''}>${d} ${unitWord}</option>`;
    }

    let th = ''; p.tasks.forEach((t, ti) => {
      th += `<div class="task-item"><input type="text" value="${t}" oninput="phases[${i}].tasks[${ti}]=this.value;render()"><button class="task-remove" onclick="phases[${i}].tasks.splice(${ti},1);renderEditor();render()">×</button></div>`;
    });

    card.innerHTML = `
      <div class="phase-card-header">
        <input type="color" value="${p.color}" oninput="phases[${i}].color=this.value;render()">
        <input type="text" value="${p.name}" oninput="phases[${i}].name=this.value;render()">
        <button class="task-remove" onclick="phases.splice(${i},1);renderEditor();render()">🗑</button>
      </div>
      <div class="phase-card-row">
        <label>Inicio:</label>
        <select onchange="phases[${i}].start=parseInt(this.value);renderEditor();render()">${so}</select>
        <label style="width:30px">Dur:</label>
        <select onchange="phases[${i}].duration=parseInt(this.value);renderEditor();render()">${du}</select>
      </div>
      <div class="task-list">${th}</div>
      <button class="add-task-btn" onclick="phases[${i}].tasks.push('New task');renderEditor();render()">+ task</button>`;
    c.appendChild(card);
  });
}

function addPhase() {
  phases.push({ name: `${phases.length + 1}. New Phase`, color: '#4444ee', start: getTotalUnits() + 1, duration: 1, tasks: ['Example task'] });
  renderEditor(); render();
}

// ── RENDER GANTT ──
function render() {
  const el = document.getElementById('gantt-export');
  const wrapper = document.getElementById('previewWrapper');
  const title = document.getElementById('chartTitle').value;
  const subtitle = document.getElementById('chartSubtitle').value;
  const fLogo = document.getElementById('footerLogo').value;
  const fVer = document.getElementById('footerVersion').value;
  const tu = getTotalUnits();
  const uLabel = getUnitLabel();

  const textOn = document.getElementById('textColorOn').checked;
  const borderOn = document.getElementById('borderColorOn').checked;
  const footerOn = document.getElementById('footerColorOn').checked;
  const gridOn = document.getElementById('gridLinesOn').checked;

  const textColor = textOn ? document.getElementById('textColor').value : 'transparent';
  const accentColor = borderOn ? document.getElementById('borderColor').value : 'transparent';
  const footerColor = footerOn ? document.getElementById('footerColor').value : 'transparent';
  const gridRaw = document.getElementById('gridLinesColor').value;
  const gridBorder = gridOn ? gridRaw + '30' : 'transparent';

  document.getElementById('textColorWrap').classList.toggle('color-disabled', !textOn);
  document.getElementById('borderColorWrap').classList.toggle('color-disabled', !borderOn);
  document.getElementById('footerColorWrap').classList.toggle('color-disabled', !footerOn);
  document.getElementById('gridLinesWrap').classList.toggle('color-disabled', !gridOn);

  el.style.background = getBgStyle();
  wrapper.classList.toggle('transparency-bg', bgMode === 'none');

  // Grid template: label column + N unit columns
  const gridCols = `200px repeat(${tu}, 1fr)`;

  // Header
  let headerCells = `<div class="g-header-label" style="color:${textColor}">Fase</div>`;
  for (let u = 1; u <= tu; u++) {
    headerCells += `<div class="g-header-unit" style="color:${textColor};border-left:1px solid ${gridBorder}">${uLabel} ${u}</div>`;
  }

  // Rows
  let rowsHTML = '';
  phases.forEach(p => {
    const tli = p.tasks.map(t => `<li>${t}</li>`).join('');
    // Label occupies column 1
    // Bar occupies columns (start+1) to (start+duration) in grid terms (col 1 is label)
    const gridColStart = p.start + 1; // +1 because col 1 is label
    const gridColEnd = p.start + p.duration + 1;
    const barLabel = getBarLabel(p.start, p.duration);

    // Build empty cells for grid lines
    let cellsBefore = '';
    for (let u = 1; u <= tu; u++) {
      cellsBefore += `<div class="g-cell-empty" style="grid-column:${u + 1};border-left:1px solid ${gridBorder}"></div>`;
    }

    rowsHTML += `
      <div class="g-row" style="grid-template-columns:${gridCols};border-bottom:1px solid ${gridBorder}">
        <div class="g-row-label" style="grid-column:1;grid-row:1;">
          <div class="g-phase-name" style="color:${textColor}">${p.name}</div>
          <ul class="g-tasks" style="color:${textColor}">${tli}</ul>
        </div>
        ${cellsBefore}
        <div class="g-bar-wrap" style="grid-column:${gridColStart}/${gridColEnd};grid-row:1;">
          <div class="g-bar" style="background:${p.color}">${barLabel}</div>
        </div>
      </div>`;
  });

  el.innerHTML = `
    <div class="gantt-title" style="color:${borderOn ? accentColor : textColor}">${title}</div>
    <div class="gantt-subtitle" style="color:${textColor}">${subtitle}</div>
    <div class="g-table">
      <div class="g-header" style="grid-template-columns:${gridCols};border-bottom:2px solid ${accentColor}">
        ${headerCells}
      </div>
      ${rowsHTML}
    </div>
    <div class="gantt-footer" style="border-top:1px solid ${gridBorder}">
      <div class="gantt-footer-logo" style="color:${footerColor}">${fLogo}</div>
      <div class="gantt-footer-text" style="color:${footerOn ? footerColor : textColor};opacity:0.5">${fVer}</div>
    </div>`;
}

// ── EXPORT ──
function exportPNG() {
  html2canvas(document.getElementById('gantt-export'), { backgroundColor: null, scale: 3, useCORS: true, logging: false }).then(c => {
    const a = document.createElement('a'); a.download = 'gantt-chart.png'; a.href = c.toDataURL('image/png'); a.click();
  });
}

// ── RESET ──
function resetAll() {
  if (!confirm('Clear everything and reset?')) return;
  phases = [];
  document.getElementById('chartTitle').value = 'Project Timeline';
  document.getElementById('chartSubtitle').value = 'Project Plan — 2026';
  document.getElementById('unitMode').value = 'weeks';
  document.getElementById('textColor').value = '#0a0a3e'; document.getElementById('textColorOn').checked = true;
  document.getElementById('borderColor').value = '#0000cc'; document.getElementById('borderColorOn').checked = true;
  document.getElementById('footerColor').value = '#0000cc'; document.getElementById('footerColorOn').checked = true;
